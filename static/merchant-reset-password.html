<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FingerPay for Business — Reset Password</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .tagline { font-size: 13px; color: #666; margin-bottom: 40px; }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }

    .card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 14px; color: #666; margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #555; }

    .btn {
      width: 100%;
      padding: 14px;
      background: white;
      color: black;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .message.error {
      background: #2a1010;
      border: 1px solid #5a1a1a;
      color: #ff6b6b;
    }
    .message.success {
      background: #0f2a15;
      border: 1px solid #1a5a2a;
      color: #5aff8a;
    }

    .back-link {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 20px;
    }
    .back-link a { color: #aaa; text-decoration: none; }
    .back-link a:hover { color: white; }

    /* Forgot password view */
    #forgot-view {}
    /* Reset password view */
    #reset-view { display: none; }
  </style>
</head>
<body>

  <div class="logo">FingerPay for Business</div>
  <div class="tagline">Accept fingerprint payments at your counter</div>

  <!-- Step 1: Enter email -->
  <div class="card" id="forgot-view">
    <h1>Reset password</h1>
    <p>Enter your account email and we'll send you a reset link.</p>

    <div class="message error" id="forgot-error"></div>
    <div class="message success" id="forgot-success"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="you@business.com"
             onkeydown="if(event.key==='Enter') sendReset()" />
    </div>
    <button class="btn" id="forgot-btn" onclick="sendReset()">Send Reset Link</button>
  </div>

  <!-- Step 2: Enter new password (token in URL) -->
  <div class="card" id="reset-view">
    <h1>New password</h1>
    <p>Choose a new password for your FingerPay account.</p>

    <div class="message error" id="reset-error"></div>
    <div class="message success" id="reset-success"></div>

    <div class="field">
      <label>New password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters" />
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="confirm-password"
             onkeydown="if(event.key==='Enter') doReset()" />
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Update Password</button>
  </div>

  <div class="back-link">
    <a href="/business/login">Back to Sign In</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (token) {
      document.getElementById("forgot-view").style.display = "none";
      document.getElementById("reset-view").style.display = "block";
    }

    async function sendReset() {
      const btn = document.getElementById("forgot-btn");
      const errEl = document.getElementById("forgot-error");
      const okEl  = document.getElementById("forgot-success");
      errEl.style.display = "none";
      okEl.style.display  = "none";

      const email = document.getElementById("forgot-email").value.trim();
      if (!email) {
        errEl.textContent = "Please enter your email address.";
        errEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const res = await fetch("/merchants/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        okEl.textContent = data.message || "Check your email for a reset link.";
        okEl.style.display = "block";
        btn.textContent = "Sent";
      } catch {
        errEl.textContent = "Network error. Please try again.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Send Reset Link";
      }
    }

    async function doReset() {
      const btn    = document.getElementById("reset-btn");
      const errEl  = document.getElementById("reset-error");
      const okEl   = document.getElementById("reset-success");
      errEl.style.display = "none";
      okEl.style.display  = "none";

      const newPass  = document.getElementById("new-password").value;
      const confPass = document.getElementById("confirm-password").value;

      if (newPass.length < 8) {
        errEl.textContent = "Password must be at least 8 characters.";
        errEl.style.display = "block";
        return;
      }
      if (newPass !== confPass) {
        errEl.textContent = "Passwords do not match.";
        errEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating...";

      try {
        const res = await fetch("/merchants/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: newPass }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.detail || "Failed to reset password.";
          errEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Update Password";
          return;
        }

        okEl.textContent = "Password updated! Redirecting to sign in...";
        okEl.style.display = "block";
        btn.textContent = "Done";
        setTimeout(() => { window.location.href = "/business/login"; }, 2000);
      } catch {
        errEl.textContent = "Network error. Please try again.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Update Password";
      }
    }
  </script>
</body>
</html>
