<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FingerPay for Business — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .tagline { font-size: 13px; color: #666; margin-bottom: 40px; }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }

    .card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 14px; color: #666; margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #555; }

    .btn {
      width: 100%;
      padding: 14px;
      background: white;
      color: black;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: #2a1010;
      border: 1px solid #5a1a1a;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: #ff6b6b;
      margin-bottom: 16px;
      display: none;
    }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 20px;
    }
    .signup-link a { color: #aaa; text-decoration: none; }
    .signup-link a:hover { color: white; }
  </style>
</head>
<body>

  <div class="logo">FingerPay for Business</div>
  <div class="tagline">Accept fingerprint payments at your counter</div>

  <div class="card">
    <h1>Sign in</h1>
    <p>Access your merchant dashboard.</p>

    <div class="error" id="error"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@business.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password"
             onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn" id="submit-btn" onclick="login()">Sign In</button>

    <div style="text-align:center; margin-top:16px;">
      <a href="/business/reset-password" style="font-size:13px; color:#aaa; text-decoration:none;">Forgot password?</a>
    </div>
  </div>

  <div class="signup-link" style="margin-top:20px;">
    Don't have an account? <a href="/business">Sign up</a>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem("merchant_token")) {
      window.location.href = "/business/dashboard";
    }

    async function login() {
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error");
      errorEl.style.display = "none";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        errorEl.textContent = "Please enter your email and password.";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in...";

      try {
        const res = await fetch("/merchants/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.detail || "Login failed.";
          errorEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Sign In";
          return;
        }

        localStorage.setItem("merchant_token", data.token);
        window.location.href = "/business/dashboard";

      } catch (e) {
        errorEl.textContent = "Network error. Please try again.";
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }
  </script>
</body>
</html>
