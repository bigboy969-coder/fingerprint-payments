<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FingerPay — Kiosk</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .logo { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .tagline { font-size: 15px; color: #888; margin-bottom: 48px; }

    /* ── Waiting for scan ── */
    #waiting-view .qr-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
    }

    #waiting-view h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    #waiting-view p { font-size: 14px; color: #888; margin-bottom: 32px; }

    .new-btn {
      padding: 12px 28px;
      background: #222;
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-btn:hover { background: #333; }

    /* ── Scan finger ── */
    #scan-view { display: none; }
    #scan-view .finger-icon { font-size: 80px; margin-bottom: 24px; animation: pulse 1.5s infinite; }
    #scan-view h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    #scan-view p { font-size: 15px; color: #888; margin-bottom: 32px; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }

    /* File upload (testing only — replaced by scanner SDK in production) */
    .upload-label {
      display: inline-block;
      padding: 14px 32px;
      background: white;
      color: black;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #fp-input { display: none; }

    /* ── Complete ── */
    #complete-view { display: none; }
    #complete-view .icon { font-size: 72px; margin-bottom: 20px; }
    #complete-view h2 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    #complete-view p { font-size: 15px; color: #888; margin-bottom: 32px; }
  </style>
</head>
<body>

  <div class="logo">FingerPay</div>
  <div class="tagline">Pay with your finger</div>

  <!-- State 1: Show QR code, wait for phone form -->
  <div id="waiting-view">
    <div class="qr-box">
      <div id="qrcode"></div>
    </div>
    <h2>Scan to enroll your card</h2>
    <p>Open the camera on your phone and scan this QR code.</p>
    <button class="new-btn" onclick="newSession()">New Customer</button>
  </div>

  <!-- State 2: Form submitted, prompt finger scan -->
  <div id="scan-view">
    <div class="finger-icon">👆</div>
    <h2>Place your finger on the scanner</h2>
    <p>Card details received. Scan to complete enrollment.</p>

    <!-- FILE UPLOAD — for testing without physical scanner -->
    <label class="upload-label" for="fp-input">Upload Fingerprint (Test)</label>
    <input type="file" id="fp-input" accept="image/*" onchange="submitFingerprint(this)" />
  </div>

  <!-- State 3: Enrollment complete -->
  <div id="complete-view">
    <div class="icon">✅</div>
    <h2>Enrolled!</h2>
    <p>You're all set. Place your finger at checkout to pay.</p>
    <button class="new-btn" onclick="newSession()" style="margin-top:8px">Next Customer</button>
  </div>

  <script>
    let currentSessionId = null;
    let pollInterval = null;

    // ── Start a new session ───────────────────────────────────────────────────
    async function newSession() {
      clearInterval(pollInterval);
      showView("waiting-view");

      const res = await fetch("/enroll/session", { method: "POST" });
      const data = await res.json();
      currentSessionId = data.session_id;

      // Build the full enrollment URL using the server's actual IP (not localhost)
      const host = window.location.host;
      const enrollUrl = `http://${host}${data.enroll_url}`;

      // Generate QR code
      document.getElementById("qrcode").innerHTML = "";
      new QRCode(document.getElementById("qrcode"), {
        text: enrollUrl,
        width: 200,
        height: 200,
        colorDark: "#000",
        colorLight: "#fff",
      });

      // Start polling for form submission
      pollInterval = setInterval(pollStatus, 2000);
    }

    // ── Poll for status change ────────────────────────────────────────────────
    async function pollStatus() {
      if (!currentSessionId) return;
      const res = await fetch(`/enroll/status/${currentSessionId}`);
      const data = await res.json();

      if (data.status === "pending_scan") {
        clearInterval(pollInterval);
        showView("scan-view");
      } else if (data.status === "complete") {
        clearInterval(pollInterval);
        showView("complete-view");
      }
    }

    // ── Submit fingerprint (testing: file upload) ─────────────────────────────
    async function submitFingerprint(input) {
      const file = input.files[0];
      if (!file || !currentSessionId) return;

      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch(`/enroll/complete/${currentSessionId}`, {
        method: "POST",
        body: formData,
      });

      if (res.ok) {
        showView("complete-view");
      } else {
        const data = await res.json();
        alert("Error: " + (data.detail || "Enrollment failed."));
      }
    }

    // ── Helper ────────────────────────────────────────────────────────────────
    function showView(id) {
      ["waiting-view", "scan-view", "complete-view"].forEach(v => {
        document.getElementById(v).style.display = v === id ? "block" : "none";
      });
    }

    // Auto-start on load
    newSession();
  </script>
</body>
</html>
