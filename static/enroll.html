<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FingerPay — Enroll</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 28px; }

    /* ── Section headers ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      margin-top: 24px;
    }
    .section-title:first-of-type { margin-top: 0; }

    /* ── Text inputs ── */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a1a;
    }
    .field input:focus { border-color: #000; }

    /* ── Stripe element wrappers ── */
    .stripe-field { margin-bottom: 12px; }
    .stripe-field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
    .stripe-input {
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      transition: border-color 0.2s;
    }
    .stripe-input.focused { border-color: #000; }

    /* ── Expiry + CVC side by side ── */
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 20px 0;
    }

    /* ── Submit ── */
    button {
      width: 100%;
      padding: 14px;
      background: #000;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }
    button:hover { background: #222; }
    button:disabled { background: #999; cursor: not-allowed; }

    /* ── Error ── */
    .error-msg {
      background: #fff0f0;
      color: #c00;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── Success ── */
    .success { text-align: center; display: none; }
    .success .icon { font-size: 56px; margin-bottom: 16px; }
    .success h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .success p { font-size: 15px; color: #666; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Form -->
    <div id="form-view">
      <div class="logo">FingerPay</div>
      <div class="subtitle">Pay with your finger. Enroll your card below.</div>

      <div id="error-msg" class="error-msg"></div>

      <!-- Section 1: Personal Info -->
      <div class="section-title">Your Info</div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="full_name" placeholder="Warren Emmanuel" autocomplete="name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Phone <span style="color:#bbb;font-weight:400">(optional)</span></label>
        <input type="tel" id="phone" placeholder="+1 234 567 8900" autocomplete="tel" />
      </div>

      <div class="divider"></div>

      <!-- Section 2: Card Details -->
      <div class="section-title">Card Details</div>

      <div class="stripe-field">
        <label>Card Number</label>
        <div class="stripe-input" id="card-number-wrapper">
          <div id="card-number-element"></div>
        </div>
      </div>

      <div class="row-2">
        <div class="stripe-field">
          <label>Expiry Date</label>
          <div class="stripe-input" id="card-expiry-wrapper">
            <div id="card-expiry-element"></div>
          </div>
        </div>
        <div class="stripe-field">
          <label>CVV</label>
          <div class="stripe-input" id="card-cvc-wrapper">
            <div id="card-cvc-element"></div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Section 3: Billing -->
      <div class="section-title">Billing</div>

      <div class="field">
        <label>ZIP / Postal Code</label>
        <input type="text" id="zip" placeholder="e.g. 10001" autocomplete="postal-code" inputmode="numeric" />
      </div>

      <button id="submit-btn" onclick="submitForm()">Enroll my card</button>
    </div>

    <!-- Success -->
    <div id="success-view" class="success">
      <div class="icon">👆</div>
      <h2>Almost there!</h2>
      <p>Now place your finger on the scanner at the kiosk to complete enrollment.</p>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session");

    if (!sessionId) {
      document.getElementById("error-msg").textContent = "Invalid enrollment link. Please scan the QR code again.";
      document.getElementById("error-msg").style.display = "block";
      document.getElementById("submit-btn").disabled = true;
    }

    let stripe, cardNumber, cardExpiry, cardCvc;

    async function initStripe() {
      const res = await fetch("/config");
      const { publishable_key } = await res.json();
      stripe = Stripe(publishable_key);
      const elements = stripe.elements();

      const style = {
        base: { fontSize: "16px", color: "#1a1a1a", "::placeholder": { color: "#bbb" } }
      };

      cardNumber = elements.create("cardNumber", { style });
      cardExpiry = elements.create("cardExpiry", { style });
      cardCvc    = elements.create("cardCvc",    { style });

      cardNumber.mount("#card-number-element");
      cardExpiry.mount("#card-expiry-element");
      cardCvc.mount("#card-cvc-element");

      // Focus styling
      [
        [cardNumber, "card-number-wrapper"],
        [cardExpiry, "card-expiry-wrapper"],
        [cardCvc,    "card-cvc-wrapper"],
      ].forEach(([el, id]) => {
        el.on("focus", () => document.getElementById(id).classList.add("focused"));
        el.on("blur",  () => document.getElementById(id).classList.remove("focused"));
      });
    }

    initStripe();

    async function submitForm() {
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error-msg");
      errorEl.style.display = "none";

      const full_name = document.getElementById("full_name").value.trim();
      const email     = document.getElementById("email").value.trim();
      const phone     = document.getElementById("phone").value.trim();
      const zip       = document.getElementById("zip").value.trim();

      if (!full_name || !email) {
        errorEl.textContent = "Please fill in your name and email.";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Setting up...";

      const { paymentMethod, error } = await stripe.createPaymentMethod({
        type: "card",
        card: cardNumber,
        billing_details: {
          name: full_name,
          email,
          address: { postal_code: zip || undefined },
        },
      });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Enroll my card";
        return;
      }

      const res = await fetch("/enroll/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          full_name,
          email,
          phone: phone || null,
          stripe_payment_method_id: paymentMethod.id,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.detail || "Something went wrong. Please try again.";
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Enroll my card";
        return;
      }

      document.getElementById("form-view").style.display = "none";
      document.getElementById("success-view").style.display = "block";
    }
  </script>
</body>
</html>
