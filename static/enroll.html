<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FingerPay — Enroll</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input:focus { border-color: #000; }

    .stripe-wrapper {
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }

    .stripe-wrapper.focused { border-color: #000; }

    button {
      width: 100%;
      padding: 14px;
      background: #000;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #222; }
    button:disabled { background: #999; cursor: not-allowed; }

    .success {
      text-align: center;
      display: none;
    }

    .success .icon { font-size: 56px; margin-bottom: 16px; }
    .success h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .success p { font-size: 15px; color: #666; line-height: 1.5; }

    .error-msg {
      background: #fff0f0;
      color: #c00;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Form -->
    <div id="form-view">
      <div class="logo">FingerPay</div>
      <div class="subtitle">Pay with your finger. Enroll your card below.</div>

      <div id="error-msg" class="error-msg"></div>

      <label>Full name</label>
      <input type="text" id="full_name" placeholder="Warren Emmanuel" autocomplete="name" />

      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

      <label>Phone (optional)</label>
      <input type="tel" id="phone" placeholder="+1 234 567 8900" autocomplete="tel" />

      <label>Card details</label>
      <div class="stripe-wrapper" id="card-wrapper">
        <div id="card-element"></div>
      </div>

      <button id="submit-btn" onclick="submitForm()">Enroll my card</button>
    </div>

    <!-- Success -->
    <div id="success-view" class="success">
      <div class="icon">👆</div>
      <h2>Almost there!</h2>
      <p>Now place your finger on the scanner at the kiosk to complete enrollment.</p>
    </div>

  </div>

  <script>
    // ── Get session ID from URL ───────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session");

    if (!sessionId) {
      document.getElementById("error-msg").textContent = "Invalid enrollment link. Please scan the QR code again.";
      document.getElementById("error-msg").style.display = "block";
      document.getElementById("submit-btn").disabled = true;
    }

    // ── Init Stripe ───────────────────────────────────────────────────────────
    let stripe, cardElement;

    async function initStripe() {
      const res = await fetch("/config");
      const { publishable_key } = await res.json();
      stripe = Stripe(publishable_key);
      const elements = stripe.elements();
      cardElement = elements.create("card", {
        style: {
          base: { fontSize: "16px", color: "#1a1a1a", "::placeholder": { color: "#aaa" } }
        }
      });
      cardElement.mount("#card-element");
      cardElement.on("focus", () => document.getElementById("card-wrapper").classList.add("focused"));
      cardElement.on("blur", () => document.getElementById("card-wrapper").classList.remove("focused"));
    }

    initStripe();

    // ── Submit form ───────────────────────────────────────────────────────────
    async function submitForm() {
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error-msg");
      errorEl.style.display = "none";

      const full_name = document.getElementById("full_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!full_name || !email) {
        errorEl.textContent = "Please fill in your name and email.";
        errorEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Setting up...";

      // Tokenize card with Stripe
      const { paymentMethod, error } = await stripe.createPaymentMethod({
        type: "card",
        card: cardElement,
        billing_details: { name: full_name, email },
      });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Enroll my card";
        return;
      }

      // Send to backend
      const res = await fetch("/enroll/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          full_name,
          email,
          phone: phone || null,
          stripe_payment_method_id: paymentMethod.id,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.detail || "Something went wrong. Please try again.";
        errorEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Enroll my card";
        return;
      }

      // Show success
      document.getElementById("form-view").style.display = "none";
      document.getElementById("success-view").style.display = "block";
    }
  </script>
</body>
</html>
